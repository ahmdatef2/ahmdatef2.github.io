  if(!t){ss("nt","\u0644\u0627 \u064a\u0648\u062c\u062f \u062a\u0648\u0643\u0646 \u2014 \u0627\u0636\u063a\u0637 \u0625\u0639\u062f\u0627\u062f \u0627\u0644\u0645\u0632\u0627\u0645\u0646\u0629");try{E=JSON.parse(localStorage.getItem("lce")||"{}")||{};}catch{E={};}render();return;}
  ss("go","\u062c\u0627\u0631\u064a \u0627\u0644\u062a\u062d\u0645\u064a\u0644...");
  try{
    const r=await fetch("https://api.github.com/gists/"+GID,{headers:{"Authorization":"token "+t,"Accept":"application/vnd.github.v3+json"}});
    if(!r.ok)throw 0;
    const d=await r.json();E=JSON.parse(d.files[FL]?.content||"{}");
    localStorage.setItem("lce",JSON.stringify(E));ss("ok","\u062a\u0645 \u0627\u0644\u062a\u062d\u0645\u064a\u0644 \u2714");render();
  }catch{try{E=JSON.parse(localStorage.getItem("lce")||"{}")||{};}catch{E={};}ss("er","\u062a\u0639\u0630\u0651\u0631 \u0627\u0644\u0627\u062a\u0635\u0627\u0644 \u2014 \u0628\u064a\u0627\u0646\u0627\u062a \u0645\u062d\u0644\u064a\u0629");render();}
}
async function save(){
  const t=gt();localStorage.setItem("lce",JSON.stringify(E));
  if(!t){ss("nt","\u0645\u062d\u0641\u0648\u0638 \u0645\u062d\u0644\u064a\u0627\u064b");return;}
  ss("go","\u062c\u0627\u0631\u064a \u0627\u0644\u062d\u0641\u0638...");
  try{
    const b={files:{}};b.files[FL]={content:JSON.stringify(E,null,2)};
    const r=await fetch("https://api.github.com/gists/"+GID,{method:"PATCH",headers:{"Authorization":"token "+t,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},body:JSON.stringify(b)});
    if(!r.ok)throw 0;
    const n=new Date(),tt=n.getHours()+":"+String(n.getMinutes()).padStart(2,"0");
    ss("ok","\u062a\u0645 \u0627\u0644\u062d\u0641\u0638 "+tt+" \u2714");
  }catch{ss("er","\u062d\u0641\u0638 \u0645\u062d\u0644\u064a \u2014 \u062a\u0639\u0630\u0651\u0631 \u0627\u0644\u0645\u0632\u0627\u0645\u0646\u0629");}
}
function sched(){clearTimeout(tmr);tmr=setTimeout(save,1500);}
function otk(){const t=localStorage.getItem("ahmd-gh-tok");document.getElementById("ti").value=t?"\u2022".repeat(20):"";document.getElementById("to").classList.add("op");}
function ctk(){document.getElementById("to").classList.remove("op");}
function svt(){const v=document.getElementById("ti").value.trim();if(v&&!v.startsWith("\u2022"))st(v);ctk();load();}
function clt(){st("");ctk();ss("nt","\u062a\u0645 \u062d\u0630\u0641 \u0627\u0644\u062a\u0648\u0643\u0646");}
document.getElementById("to").addEventListener("click",function(e){if(e.target===this)ctk();});
function gc(g){return g.includes("\u0627\u0644\u062e\u0627\u0645\u0633")?"g5":g.includes("\u0627\u0644\u0633\u0627\u062f\u0633")?"g6":g.includes("\u0627\u0644\u0623\u0648\u0644")?"g1":"g2";}
function ymd(d){return d.toISOString().split("T")[0];}
function itd(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function fmt(s){if(!s)return"";const d=new Date(s);return isNaN(d)?s:d.getDate()+" "+MN[d.getMonth()];}
function days(ws){const b=new Date(ws);return DN.map((_,i)=>{const d=new Date(b);d.setDate(b.getDate()+i);return d;});}
function mg(){return D.map(l=>Object.assign({...l},E[l.id]||{}));}
function render(){
  const all=mg(),wl=all.filter(l=>l.week===St.w&&St.g.has(l.grade));
  const sp=D.find(l=>l.week===St.w)||{},ws=sp.weekStart||"2026-02-08",dys=days(ws);
  document.getElementById("wn").textContent=sp.weekName||"";
  document.getElementById("wc").textContent=sp.weekCode||"";
  document.getElementById("pv").disabled=St.w<=1;
  document.getElementById("nx").disabled=St.w>=15;
  const tot=wl.length,dn=wl.filter(l=>l.status===DS).length;
  const sc=wl.filter(l=>l.teachDate&&dys.find(d=>ymd(d)===l.teachDate)).length;
  document.getElementById("st").innerHTML="<span class='si'>\u0627\u0644\u0623\u0633\u0628\u0648\u0639: <b>"+tot+"</b></span><span class='si'>\u0645\u062c\u062f\u0648\u0644: <b>"+sc+"</b></span><span class='si'>\u062a\u0645: <b>"+dn+"</b></span><span class='si'>\u0645\u062a\u0628\u0642\u064a: <b>"+(tot-dn)+"</b></span>";
  const gr=document.getElementById("gr");gr.style.gridTemplateColumns="130px repeat(5,1fr)";gr.innerHTML="";
  const h0=document.createElement("div");h0.className="ch";h0.innerHTML="<span class='cd'>\u0627\u0644\u0635\u0641</span>";gr.appendChild(h0);
  dys.forEach((d,i)=>{const h=document.createElement("div");h.className="ch"+(itd(d)?" td":"");h.innerHTML="<div class='cd'>"+DN[i]+"</div><div class='ct'>"+fmt(ymd(d))+"</div>";gr.appendChild(h);});
  GL.filter(g=>St.g.has(g)).forEach(grade=>{
    const c=gc(grade),gl=wl.filter(l=>l.grade===grade);
    const bd={};dys.forEach(d=>{bd[ymd(d)]=[];});
    gl.forEach(l=>{if(l.teachDate&&bd[l.teachDate]!==undefined)bd[l.teachDate].push(l);});
    const rl=document.createElement("div");rl.className="rl";
    rl.innerHTML="<span class='gt "+c+"'>"+grade.replace("\u0627\u0644\u0635\u0641 ","").replace(" \u0627\u0644\u0625\u0639\u062f\u0627\u062f\u064a","\u0625\u0639\u062f\u0627\u062f\u064a")+"</span>";gr.appendChild(rl);
    dys.forEach(d=>{
      const ym=ymd(d),cl=document.createElement("div");cl.className="cl"+(itd(d)?" td":"");
      (bd[ym]||[]).forEach(l=>{
        const cd=document.createElement("div");cd.className="lc "+c+(l.status===DS?" dn":"");
        cd.innerHTML=(l.status===DS?"<span class='lk'>\u2713</span>":"")+"<div class='ln'>"+l.lesson.replace(/^[^:]+:/,"").trim()+"</div>";
        cd.onclick=()=>om(l.id);cl.appendChild(cd);
      });
      gr.appendChild(cl);
    });
  });
  const au=wl.filter(l=>!l.teachDate||!dys.find(d=>ymd(d)===l.teachDate));
  const us=document.getElementById("us"),up=document.getElementById("up");
  if(au.length){us.style.display="block";up.innerHTML="";
    au.forEach(l=>{const p=document.createElement("span"),c2=gc(l.grade);p.className="pi "+c2;
      const sn=l.lesson.replace(/^[^:]+:/,"").trim();
      p.textContent=l.grade.replace("\u0627\u0644\u0635\u0641 ","").replace(" \u0627\u0644\u0625\u0639\u062f\u0627\u062f\u064a","")+": "+(sn.length>26?sn.slice(0,26)+"\u2026":sn);
      p.title=l.grade+" \u2014 "+l.lesson;p.onclick=()=>om(l.id);up.appendChild(p);});
  }else us.style.display="none";
}
function om(id){mid=id;const l=mg().find(x=>x.id===id);if(!l)return;
  document.getElementById("mt").textContent=l.lesson;
  document.getElementById("ms").textContent=l.grade+" \u00b7 "+l.weekName;
  document.getElementById("md").value=l.teachDate||"";
  document.getElementById("ms2").value=l.status||"\u0644\u0645 \u064a\u064f\u062f\u0631\u064e\u0651\u0633 \u0628\u0639\u062f";
  document.getElementById("mn").value=l.notes||"";
  document.getElementById("mo").classList.add("op");}
function cm(){document.getElementById("mo").classList.remove("op");mid=null;}
function sl(){if(!mid)return;E[mid]={teachDate:document.getElementById("md").value,status:document.getElementById("ms2").value,notes:document.getElementById("mn").value};cm();render();sched();}
function cll(){if(!mid)return;delete E[mid];cm();render();sched();}
function pv(){if(St.w>1){St.w--;render();}}
function nx(){if(St.w<15){St.w++;render();}}
function gn(){const t=new Date();t.setHours(0,0,0,0);let f=1;
  for(let w=1;w<=15;w++){const s=D.find(l=>l.week===w);if(!s)continue;
    const w2=new Date(s.weekStart),we=new Date(w2);we.setDate(w2.getDate()+4);
    if(t>=w2&&t<=we){f=w;break;}if(t<w2){f=w;break;}}St.w=f;render();}
function tg(g){if(St.g.has(g)){if(St.g.size>1)St.g.delete(g);}else St.g.add(g);
  document.querySelectorAll(".gb").forEach(b=>b.classList.toggle("on",St.g.has(b.dataset.g)));render();}
document.getElementById("mo").addEventListener("click",function(e){if(e.target===this)cm();});
gn();load();
</script>
</body>
