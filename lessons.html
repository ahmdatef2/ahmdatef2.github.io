<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<title>خطة الدروس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f7f6;--s:#fff;--s2:#eef1f0;--b:#d8dfe0;--a1:#3a7bd5;--t:#333;--m:#6b7a7f;--h:#1a2328;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Cairo,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.pg{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.7rem}
.tt{font-size:1.4rem;font-weight:900;color:var(--h)}
.bb{display:inline-flex;align-items:center;gap:.4rem;background:var(--s);border:1px solid var(--b);border-radius:10px;padding:.4rem .9rem;color:var(--m);font-family:Cairo,sans-serif;font-size:.85rem;text-decoration:none;transition:all .15s}
.bb:hover{border-color:var(--a1);color:var(--a1)}
.p{background:var(--s);border:1px solid var(--b);border-radius:18px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.4rem;border-bottom:1px solid var(--b);flex-wrap:wrap;gap:.7rem}
.pt{font-size:1.05rem;font-weight:700;color:var(--h)}
.pc{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.btn{background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-family:Cairo,sans-serif;font-size:.82rem;padding:.3rem .75rem;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--a1);color:var(--a1)}.btn.act{background:var(--a1);border-color:var(--a1);color:#fff}.btn:disabled{opacity:.4;cursor:default}
.wn{display:flex;align-items:center;gap:.4rem}
.wl{font-size:.88rem;font-weight:700;color:var(--h);min-width:140px;text-align:center}
.wc{font-size:.72rem;color:var(--m);background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:.1rem .5rem}
.gf{display:flex;gap:.35rem;flex-wrap:wrap}
.gb{font-size:.78rem;padding:.22rem .6rem;border-radius:20px;border:1.5px solid var(--b);background:var(--s2);color:var(--m);font-family:Cairo,sans-serif;cursor:pointer;transition:all .15s}
.gb.g5{border-color:#f59e0b}.gb.g5.on{background:#f59e0b;color:#fff}
.gb.g6{border-color:#10b981}.gb.g6.on{background:#10b981;color:#fff}
.gb.g1{border-color:#3b82f6}.gb.g1.on{background:#3b82f6;color:#fff}
.gb.g2{border-color:#a855f7}.gb.g2.on{background:#a855f7;color:#fff}
.sb{display:flex;align-items:center;justify-content:space-between;padding:.4rem 1.4rem;border-bottom:1px solid var(--b);background:var(--s2);font-size:.76rem;flex-wrap:wrap;gap:.5rem}
.sl{display:flex;align-items:center;gap:.5rem}
.sd{width:8px;height:8px;border-radius:50%;background:#6b7a7f;flex-shrink:0;transition:background .3s}
.sd.ok{background:#10b981}.sd.go{background:#f59e0b;animation:pu .8s infinite}.sd.er{background:#ef4444}.sd.nt{background:#f59e0b}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sm{color:var(--m)}
.tkb{background:none;border:1px solid var(--b);border-radius:6px;color:var(--m);font-family:Cairo,sans-serif;font-size:.74rem;padding:.15rem .5rem;cursor:pointer;transition:all .15s}
.tkb:hover{border-color:var(--a1);color:var(--a1)}
.gw{overflow-x:auto}
.gr{display:grid;grid-template-columns:130px repeat(5,1fr);min-width:660px}
.ch{padding:.55rem .4rem;text-align:center;border-bottom:2px solid var(--b);border-left:1px solid var(--b);background:var(--s2)}
.ch:first-child{border-left:none}.ch.td{background:rgba(58,123,213,.09)}
.cd{font-size:.85rem;font-weight:700;color:var(--h)}.ct{font-size:.7rem;color:var(--m)}
.ch.td .cd{color:var(--a1)}
.rl{padding:.45rem .6rem;border-bottom:1px solid var(--b);border-left:1px solid var(--b);background:var(--s2);display:flex;align-items:center;justify-content:flex-end}
.gt{font-size:.73rem;font-weight:700;padding:.18rem .55rem;border-radius:12px;color:#fff;white-space:nowrap}
.gt.g5{background:#f59e0b}.gt.g6{background:#10b981}.gt.g1{background:#3b82f6}.gt.g2{background:#a855f7}
.cl{padding:.35rem;min-height:78px;border-bottom:1px solid var(--b);border-left:1px solid var(--b)}
.cl.td{background:rgba(58,123,213,.03)}
.lc{border-radius:7px;padding:.28rem .45rem;margin-bottom:.28rem;cursor:pointer;font-size:.75rem;line-height:1.35;border:1.5px solid transparent;transition:all .15s;position:relative}
.lc:hover{transform:translateY(-1px);filter:brightness(1.07)}
.lc.g5{background:rgba(245,158,11,.13);border-color:rgba(245,158,11,.35)}
.lc.g6{background:rgba(16,185,129,.13);border-color:rgba(16,185,129,.35)}
.lc.g1{background:rgba(59,130,246,.13);border-color:rgba(59,130,246,.35)}
.lc.g2{background:rgba(168,85,247,.13);border-color:rgba(168,85,247,.35)}
.lc.dn{opacity:.5}.lc.dn .ln{text-decoration:line-through}
.ln{font-weight:600;color:var(--t)}.lk{position:absolute;left:.3rem;top:.3rem;font-size:.72rem}
.us{padding:.65rem 1.2rem;border-top:1px solid var(--b)}
.ul{font-size:.75rem;color:var(--m);margin-bottom:.4rem;font-weight:600}
.up{display:flex;flex-wrap:wrap;gap:.3rem}
.pi{font-size:.71rem;padding:.18rem .5rem;border-radius:20px;cursor:pointer;transition:all .15s;font-family:Cairo,sans-serif}
.pi:hover{transform:translateY(-1px)}
.pi.g5{background:rgba(245,158,11,.15);color:#d97706;border:1px solid rgba(245,158,11,.3)}
.pi.g6{background:rgba(16,185,129,.15);color:#059669;border:1px solid rgba(16,185,129,.3)}
.pi.g1{background:rgba(59,130,246,.15);color:#2563eb;border:1px solid rgba(59,130,246,.3)}
.pi.g2{background:rgba(168,85,247,.15);color:#9333ea;border:1px solid rgba(168,85,247,.3)}
.st{display:flex;gap:1rem;padding:.6rem 1.4rem;border-top:1px solid var(--b);flex-wrap:wrap}
.si{font-size:.78rem;color:var(--m)}.si b{color:var(--t)}
.to{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.to.op{display:flex}
.tb2{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:1.5rem;width:min(420px,92vw);direction:rtl;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:mi .2s ease}
.tt2{font-size:1rem;font-weight:700;color:var(--h);margin-bottom:.5rem}
.td2{font-size:.82rem;color:var(--m);line-height:1.7;margin-bottom:1rem}
.td2 a{color:var(--a1)}
.ti{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:.5rem .7rem;color:var(--t);font-family:monospace;font-size:.85rem;outline:none;direction:ltr}
.ti:focus{border-color:var(--a1)}
.ta{display:flex;gap:.5rem;margin-top:1rem;justify-content:flex-end}
.ts{background:var(--a1);color:#fff;border:none;border-radius:8px;padding:.4rem 1rem;font-family:Cairo,sans-serif;font-size:.87rem;cursor:pointer;font-weight:600}
.tc{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.4rem .8rem;font-family:Cairo,sans-serif;font-size:.87rem;cursor:pointer}
.tn{background:var(--s2);color:var(--m);border:1px solid var(--b);border-radius:8px;padding:.4rem .8rem;font-family:Cairo,sans-serif;font-size:.87rem;cursor:pointer}
.mo{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);align-items:center;justify-content:center}
.mo.op{display:flex}
.mb{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:1.4rem;width:min(460px,95vw);max-height:90vh;overflow-y:auto;direction:rtl;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:mi .2s ease}
@keyframes mi{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.9rem}
.mt{font-size:.95rem;font-weight:700;color:var(--h);line-height:1.4;flex:1;margin-left:.5rem}
.mx{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--m);line-height:1}
.ms{font-size:.78rem;color:var(--m);margin-bottom:1rem}
.mb label{display:block;font-size:.81rem;color:var(--m);margin:.7rem 0 .2rem}
.mb input[type=date],.mb select,.mb textarea{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:.45rem .65rem;color:var(--t);font-family:Cairo,sans-serif;font-size:.87rem;outline:none;transition:border-color .15s}
.mb input[type=date]:focus,.mb select:focus,.mb textarea:focus{border-color:var(--a1)}
.mb textarea{resize:vertical;min-height:65px}
.ma{display:flex;gap:.5rem;margin-top:1.1rem;justify-content:flex-end}
.msv{background:var(--a1);color:#fff;border:none;border-radius:8px;padding:.42rem 1.1rem;font-family:Cairo,sans-serif;font-size:.87rem;cursor:pointer;font-weight:600}
.mcl{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.42rem .85rem;font-family:Cairo,sans-serif;font-size:.87rem;cursor:pointer}
.mcn{background:var(--s2);color:var(--m);border:1px solid var(--b);border-radius:8px;padding:.42rem .85rem;font-family:Cairo,sans-serif;font-size:.87rem;cursor:pointer}
footer{margin-top:2rem;text-align:center;color:var(--m);font-size:.8rem;padding-top:1rem;border-top:1px solid var(--b)}
</style>
</head>
<body>
<div class="pg">
<div class="tb"><div class="tt">&#128218; خطة الدروس</div><a href="index.html" class="bb">&#8594; الصفحة الرئيسية</a></div>
<div class="p">
<div class="ph"><div class="pt" id="wt">خطة الدروس</div>
<div class="pc">
<div class="gf">
<button class="gb g5 on" data-g="الصف الخامس" onclick="tg(this.dataset.g)">خامس</button>
<button class="gb g6 on" data-g="الصف السادس" onclick="tg(this.dataset.g)">سادس</button>
<button class="gb g1 on" data-g="الصف الأول الإعدادي" onclick="tg(this.dataset.g)">أول إعدادي</button>
<button class="gb g2 on" data-g="الصف الثاني الإعدادي" onclick="tg(this.dataset.g)">ثاني إعدادي</button>
</div>
<div class="wn"><button class="btn" id="pv" onclick="pv()">&#8594;</button><span class="wl" id="wn"></span><span class="wc" id="wc"></span><button class="btn" id="nx" onclick="nx()">&#8592;</button></div>
<button class="btn act" onclick="gn()">الأسبوع الحالي</button>
</div></div>
<div class="sb"><div class="sl"><div class="sd" id="sd"></div><span class="sm" id="sm">جاري التحميل...</span></div><button class="tkb" onclick="otk()">&#128273; إعداد المزامنة</button></div>
<div class="gw"><div class="gr" id="gr"></div></div>
<div class="us" id="us" style="display:none"><div class="ul">&#9203; دروس لم تُجدَّل</div><div class="up" id="up"></div></div>
<div class="st" id="st"></div>
</div>
<footer>صُمّمت بعناية &middot; أحمد عاطف &middot; <span id="yr"></span></footer>
</div>
<div class="to" id="to"><div class="tb2">
<div class="tt2">&#128273; إعداد مزامنة GitHub</div>
<div class="td2">أدخل Personal Access Token.<br>يُحفظ في متصفحك فقط — لا يظهر بالكود.<br><a href="https://github.com/settings/tokens/new?scopes=gist&description=lessons-sync" target="_blank">إنشاء توكن ↗</a></div>
<input class="ti" id="ti" type="password" placeholder="ghp_...">
<div class="ta"><button class="tc" onclick="clt()">حذف</button><button class="tn" onclick="ctk()">إلغاء</button><button class="ts" onclick="svt()">&#128190; حفظ</button></div>
</div></div>
<div class="mo" id="mo"><div class="mb">
<div class="mh"><div class="mt" id="mt">إضافة / تعديل درس</div><button class="mx" onclick="cm()">&#x2715;</button></div>
<div class="ms" id="ms"></div>
<label>&#128218; اسم الدرس</label><input type="text" id="mln" placeholder="اكتب اسم الدرس هنا..." style="width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:.45rem .65rem;color:var(--t);font-family:Cairo,sans-serif;font-size:.87rem;outline:none;transition:border-color .15s;" onfocus="this.style.borderColor='var(--a1)'" onblur="this.style.borderColor='var(--b)'">
<label>&#128197; تاريخ التدريس</label><input type="date" id="md">
<label>&#128278; الحالة</label>
<select id="ms2"><option value="لم يُدرَّس بعد">لم يُدرَّس بعد</option><option value="تم تدريسه">&#x2705; تم تدريسه</option></select>
<label>&#128221; ملاحظات</label><textarea id="mn" placeholder="ملاحظات..."></textarea>
<div class="ma"><button class="mcl" onclick="cll()">مسح</button><button class="mcn" onclick="cm()">إلغاء</button><button class="msv" onclick="sl()">&#128190; حفظ</button></div>
</div></div>
<script>
document.getElementById("yr").textContent=new Date().getFullYear();
const D=[];
const WK=[
  {week:1,weekName:"الأسبوع الأول",weekCode:"001",weekStart:"2026-02-08"},
  {week:2,weekName:"الأسبوع الثاني",weekCode:"002",weekStart:"2026-02-15"},
  {week:3,weekName:"الأسبوع الثالث",weekCode:"003",weekStart:"2026-02-22"},
  {week:4,weekName:"الأسبوع الرابع",weekCode:"004",weekStart:"2026-03-01"},
  {week:5,weekName:"الأسبوع الخامس",weekCode:"005",weekStart:"2026-03-08"},
  {week:6,weekName:"الأسبوع السادس",weekCode:"006",weekStart:"2026-03-15"},
  {week:7,weekName:"الأسبوع السابع",weekCode:"007",weekStart:"2026-03-22"},
  {week:8,weekName:"الأسبوع الثامن",weekCode:"008",weekStart:"2026-03-29"},
  {week:9,weekName:"الأسبوع التاسع",weekCode:"009",weekStart:"2026-04-05"},
  {week:10,weekName:"الأسبوع العاشر",weekCode:"010",weekStart:"2026-04-12"},
  {week:11,weekName:"الأسبوع الحادي عشر",weekCode:"011",weekStart:"2026-04-19"},
  {week:12,weekName:"الأسبوع الثاني عشر",weekCode:"012",weekStart:"2026-04-26"},
  {week:13,weekName:"الأسبوع الثالث عشر",weekCode:"013",weekStart:"2026-05-03"},
  {week:14,weekName:"الأسبوع الرابع عشر",weekCode:"014",weekStart:"2026-05-10"},
  {week:15,weekName:"الأسبوع الخامس عشر",weekCode:"015",weekStart:"2026-05-17"}
];
const GID="4793a362e432b0a4ab05e76af170b992";
const TK0="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";
const FL="lessons_edits.json";
const MN=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const DN=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس"];
const GL=["الصف الخامس","الصف السادس","الصف الأول الإعدادي","الصف الثاني الإعدادي"];
const DS="تم تدريسه";
function gt(){return localStorage.getItem("ahmd-gh-tok")||TK0;}
function st(t){t?localStorage.setItem("ahmd-gh-tok",t):localStorage.removeItem("ahmd-gh-tok");}
let E={},St={w:1,g:new Set(GL)},mid=null,tmr=null;
function ss(s,m){const d=document.getElementById("sd"),t=document.getElementById("sm");if(d)d.className="sd "+s;if(t)t.textContent=m;}

async function load(){
  const t=gt();
  if(!t){ss("nt","\u0644\u0627 \u064a\u0648\u062c\u062f \u062a\u0648\u0643\u0646 \u2014 \u0627\u0636\u063a\u0637 \u0625\u0639\u062f\u0627\u062f \u0627\u0644\u0645\u0632\u0627\u0645\u0646\u0629");try{E=JSON.parse(localStorage.getItem("lce")||"{}")||{};}catch{E={};}render();return;}
  ss("go","\u062c\u0627\u0631\u064a \u0627\u0644\u062a\u062d\u0645\u064a\u0644...");
  try{
    const r=await fetch("https://api.github.com/gists/"+GID,{headers:{"Authorization":"token "+t,"Accept":"application/vnd.github.v3+json"}});
    if(!r.ok)throw 0;
    const d=await r.json();E=JSON.parse(d.files[FL]?.content||"{}");
    localStorage.setItem("lce",JSON.stringify(E));ss("ok","\u062a\u0645 \u0627\u0644\u062a\u062d\u0645\u064a\u0644 \u2714");render();
  }catch{try{E=JSON.parse(localStorage.getItem("lce")||"{}")||{};}catch{E={};}ss("er","\u062a\u0639\u0630\u0651\u0631 \u0627\u0644\u0627\u062a\u0635\u0627\u0644 \u2014 \u0628\u064a\u0627\u0646\u0627\u062a \u0645\u062d\u0644\u064a\u0629");render();}
}
async function save(){
  const t=gt();localStorage.setItem("lce",JSON.stringify(E));
  if(!t){ss("nt","\u0645\u062d\u0641\u0648\u0638 \u0645\u062d\u0644\u064a\u0627\u064b");return;}
  ss("go","\u062c\u0627\u0631\u064a \u0627\u0644\u062d\u0641\u0638...");
  try{
    const b={files:{}};b.files[FL]={content:JSON.stringify(E,null,2)};
    const r=await fetch("https://api.github.com/gists/"+GID,{method:"PATCH",headers:{"Authorization":"token "+t,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},body:JSON.stringify(b)});
    if(!r.ok)throw 0;
    const n=new Date(),tt=n.getHours()+":"+String(n.getMinutes()).padStart(2,"0");
    ss("ok","\u062a\u0645 \u0627\u0644\u062d\u0641\u0638 "+tt+" \u2714");
  }catch{ss("er","\u062d\u0641\u0638 \u0645\u062d\u0644\u064a \u2014 \u062a\u0639\u0630\u0651\u0631 \u0627\u0644\u0645\u0632\u0627\u0645\u0646\u0629");}
}
function sched(){clearTimeout(tmr);tmr=setTimeout(save,1500);}
function otk(){const t=localStorage.getItem("ahmd-gh-tok");document.getElementById("ti").value=t?"\u2022".repeat(20):"";document.getElementById("to").classList.add("op");}
function ctk(){document.getElementById("to").classList.remove("op");}
function svt(){const v=document.getElementById("ti").value.trim();if(v&&!v.startsWith("\u2022"))st(v);ctk();load();}
function clt(){st("");ctk();ss("nt","\u062a\u0645 \u062d\u0630\u0641 \u0627\u0644\u062a\u0648\u0643\u0646");}
document.getElementById("to").addEventListener("click",function(e){if(e.target===this)ctk();});
function gc(g){return g.includes("\u0627\u0644\u062e\u0627\u0645\u0633")?"g5":g.includes("\u0627\u0644\u0633\u0627\u062f\u0633")?"g6":g.includes("\u0627\u0644\u0623\u0648\u0644")?"g1":"g2";}
function ymd(d){return d.toISOString().split("T")[0];}
function itd(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function fmt(s){if(!s)return"";const d=new Date(s);return isNaN(d)?s:d.getDate()+" "+MN[d.getMonth()];}
function days(ws){const b=new Date(ws);return DN.map((_,i)=>{const d=new Date(b);d.setDate(b.getDate()+i);return d;});}
function mg(){
  // base lessons from D
  const base=D.map(l=>Object.assign({...l},E[l.id]||{}));
  // also include user-created lessons stored only in E
  const extra=Object.entries(E).filter(([id])=>!D.find(l=>l.id===id)).map(([id,v])=>({id,...v}));
  return [...base,...extra];
}
function render(){
  const all=mg(),wl=all.filter(l=>l.week===St.w&&St.g.has(l.grade));
  const sp=WK.find(w=>w.week===St.w)||WK[0],ws=sp.weekStart,dys=days(ws);
  const wn_val=sp.weekName;document.getElementById("wn").textContent=wn_val;
  document.getElementById("wc").textContent=sp.weekCode;
  document.getElementById("pv").disabled=St.w<=1;
  document.getElementById("nx").disabled=St.w>=15;
  const tot=wl.length,dn=wl.filter(l=>l.status===DS).length;
  const sc=wl.filter(l=>l.teachDate&&dys.find(d=>ymd(d)===l.teachDate)).length;
  document.getElementById("st").innerHTML="<span class='si'>\u0627\u0644\u0623\u0633\u0628\u0648\u0639: <b>"+tot+"</b></span><span class='si'>\u0645\u062c\u062f\u0648\u0644: <b>"+sc+"</b></span><span class='si'>\u062a\u0645: <b>"+dn+"</b></span><span class='si'>\u0645\u062a\u0628\u0642\u064a: <b>"+(tot-dn)+"</b></span>";
  const gr=document.getElementById("gr");gr.style.gridTemplateColumns="130px repeat(5,1fr)";gr.innerHTML="";
  const h0=document.createElement("div");h0.className="ch";h0.innerHTML="<span class='cd'>\u0627\u0644\u0635\u0641</span>";gr.appendChild(h0);
  dys.forEach((d,i)=>{const h=document.createElement("div");h.className="ch"+(itd(d)?" td":"");h.innerHTML="<div class='cd'>"+DN[i]+"</div><div class='ct'>"+fmt(ymd(d))+"</div>";gr.appendChild(h);});
  GL.filter(g=>St.g.has(g)).forEach(grade=>{
    const c=gc(grade),gl=wl.filter(l=>l.grade===grade);
    const bd={};dys.forEach(d=>{bd[ymd(d)]=[];});
    gl.forEach(l=>{if(l.teachDate&&bd[l.teachDate]!==undefined)bd[l.teachDate].push(l);});
    const rl=document.createElement("div");rl.className="rl";
    rl.innerHTML="<span class='gt "+c+"'>"+grade.replace("\u0627\u0644\u0635\u0641 ","").replace(" \u0627\u0644\u0625\u0639\u062f\u0627\u062f\u064a","\u0625\u0639\u062f\u0627\u062f\u064a")+"</span>";gr.appendChild(rl);
    dys.forEach(d=>{
      const ym=ymd(d),cl=document.createElement("div");cl.className="cl"+(itd(d)?" td":"");
      (bd[ym]||[]).forEach(l=>{
        const cd=document.createElement("div");cd.className="lc "+c+(l.status===DS?" dn":"");
        cd.innerHTML=(l.status===DS?"<span class='lk'>\u2713</span>":"")+"<div class='ln'>"+l.lesson.replace(/^[^:]+:/,"").trim()+"</div>";
        cd.onclick=()=>om(l.id);cl.appendChild(cd);
      });
      // click on empty cell to add new lesson
      cl.addEventListener("click",function(e){if(e.target===cl)onc(grade,ym,wn_val);});
      gr.appendChild(cl);
    });
  });
  const au=wl.filter(l=>!l.teachDate||!dys.find(d=>ymd(d)===l.teachDate));
  const us=document.getElementById("us"),up=document.getElementById("up");
  if(au.length){us.style.display="block";up.innerHTML="";
    au.forEach(l=>{const p=document.createElement("span"),c2=gc(l.grade);p.className="pi "+c2;
      const sn=l.lesson.replace(/^[^:]+:/,"").trim();
      p.textContent=l.grade.replace("\u0627\u0644\u0635\u0641 ","").replace(" \u0627\u0644\u0625\u0639\u062f\u0627\u062f\u064a","")+": "+(sn.length>26?sn.slice(0,26)+"\u2026":sn);
      p.title=l.grade+" \u2014 "+l.lesson;p.onclick=()=>om(l.id);up.appendChild(p);});
  }else us.style.display="none";
}
function om(id){mid=id;const l=mg().find(x=>x.id===id);if(!l)return;
  document.getElementById("ms").textContent=l.grade+"·"+l.weekName;
  document.getElementById("mln").value=l.lesson||"";
  document.getElementById("md").value=l.teachDate||"";
  document.getElementById("ms2").value=l.status||"لم يُدرَّس بعد";
  document.getElementById("mn").value=l.notes||"";
  document.getElementById("mo").classList.add("op");}
function cm(){document.getElementById("mo").classList.remove("op");mid=null;}
function sl(){if(!mid)return;const ln=document.getElementById("mln").value.trim();E[mid]={lesson:ln,teachDate:document.getElementById("md").value,status:document.getElementById("ms2").value,notes:document.getElementById("mn").value};cm();render();sched();}
function cll(){if(!mid)return;delete E[mid];cm();render();sched();}
function pv(){if(St.w>1){St.w--;render();}}
function nx(){if(St.w<15){St.w++;render();}}
function onc(grade,date,weekName){
  // generate new id
  const id="usr-"+Date.now();
  mid=id;
  // pre-fill E with skeleton
  const wk=WK.find(w=>w.week===St.w)||WK[0];
  E[id]={id,grade,week:St.w,weekName:weekName,weekCode:String(St.w).padStart(3,"0"),weekStart:wk.weekStart||date,lesson:"",teachDate:date,status:"لم يُدرَّس بعد",notes:""};
  document.getElementById("ms").textContent=grade+" · "+weekName;
  document.getElementById("mln").value="";
  document.getElementById("md").value=date;
  document.getElementById("ms2").value="لم يُدرَّس بعد";
  document.getElementById("mn").value="";
  document.getElementById("mo").classList.add("op");
}
function gn(){const t=new Date();t.setHours(0,0,0,0);let f=1;
  for(let w=0;w<WK.length;w++){const s=WK[w];
    const w2=new Date(s.weekStart),we=new Date(w2);we.setDate(w2.getDate()+4);
    if(t>=w2&&t<=we){f=s.week;break;}if(t<w2){f=s.week;break;}}St.w=f;render();}
function tg(g){if(St.g.has(g)){if(St.g.size>1)St.g.delete(g);}else St.g.add(g);
  document.querySelectorAll(".gb").forEach(b=>b.classList.toggle("on",St.g.has(b.dataset.g)));render();}
document.getElementById("mo").addEventListener("click",function(e){if(e.target===this)cm();});
gn();load();
</script>
